<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 1px solid #e0e0e0;
        }

        .header {
            background-color: #1a73e8;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 25px;
        }

        .card {
            border: 1px solid #f0f0f0;
            border-left: 4px solid #1a73e8;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #fafafa;
        }

        .card h3 {
            margin-top: 0;
            color: #333;
            font-size: 16px;
            text-transform: uppercase;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .label {
            color: #666;
            font-size: 14px;
        }

        .value {
            font-weight: bold;
            color: #111;
        }

        .footer {
            background-color: #f1f3f4;
            color: #777;
            font-size: 12px;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2 style="margin:0;" th:text="${title}">Market Update Report</h2>
    </div>
    <div class="content">
        <div th:each="stock : ${stocks}" class="card">
            <h3 th:text="${stock.symbol}">STOCK</h3>
            <div class="price-row">
                <span class="label">Current Open:</span>
                <span class="value" th:text="${'$' + stock.open}">$0.00</span>
            </div>
            <div class="price-row">
                <span class="label">1 Month Ago:</span>
                <span class="value" th:text="${'$' + stock.pastOpen}">$0.00</span>
            </div>
        </div>

        <div class="card" style="border-left-color: #34a853;">
            <h3 th:text="${'Forex: ' + forex.ticker}">Forex</h3>
            <div class="price-row">
                <span class="label">Opening Price:</span>
                <span class="value" th:text="${'R ' + forex.openingPrice}">R 0.00</span>
            </div>
        </div>
    </div>
    <div class="footer">
        Sent via Centralized Email API • <span th:text="${#calendars.format(#calendars.createNow(), 'MMMM dd, yyyy')}">Date</span>
    </div>
</div>
</body>
</html>
